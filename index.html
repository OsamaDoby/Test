<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doby Mail - بريد مؤقت احترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; transition: all 0.3s ease; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen pb-10">

    <nav class="p-5 flex justify-between items-center max-w-6xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="bg-primary p-2 rounded-lg text-white">
                <i class="fas fa-bolt text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Doby <span class="text-primary">Mail</span></h1>
        </div>
        <button id="themeToggle" class="w-10 h-10 rounded-xl bg-white dark:bg-gray-800 shadow-sm border border-gray-200 dark:border-gray-700 flex items-center justify-center transition-all active:scale-90">
            <i class="fas fa-moon text-gray-600 dark:text-yellow-400"></i>
        </button>
    </nav>

    <main class="max-w-3xl mx-auto px-4 mt-8">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold mb-2">بريدك المؤقت المجاني</h2>
            <p class="text-gray-500 dark:text-gray-400 text-sm">احمِ خصوصيتك من الرسائل المزعجة بضغطة زر.</p>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 shadow-xl border border-gray-100 dark:border-gray-700 mb-6">
            <div class="relative mb-4">
                <input type="text" id="emailAddr" readonly 
                    class="w-full p-5 rounded-2xl bg-gray-50 dark:bg-gray-700/50 text-center font-mono text-lg border-2 border-dashed border-gray-300 dark:border-gray-600 outline-none"
                    value="جاري التجهيز...">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="copyEmail()" class="bg-primary hover:bg-blue-600 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95">
                    <i class="fas fa-copy"></i> نسخ
                </button>
                <button onclick="genEmail()" class="bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95 text-gray-700 dark:text-white">
                    <i class="fas fa-redo"></i> جديد
                </button>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden">
            <div class="p-5 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-700/30">
                <div class="flex items-center gap-2">
                    <i class="fas fa-inbox text-primary"></i>
                    <span class="font-bold">صندوق الوارد</span>
                </div>
                <div id="statusIcon" class="flex items-center gap-2 text-xs text-green-500 font-medium">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                    مباشر
                </div>
            </div>

            <div id="messages" class="min-h-[300px]">
                <div class="flex flex-col items-center justify-center p-20 text-gray-400">
                    <i class="fas fa-envelope-open text-5xl mb-4 opacity-10"></i>
                    <p class="text-sm">لا توجد رسائل حالياً</p>
                </div>
            </div>
        </div>
    </main>

    <div id="mailModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 w-full max-w-2xl rounded-t-3xl sm:rounded-3xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-6 border-b dark:border-gray-700 flex justify-between items-center">
                <h3 id="modalSubject" class="font-bold truncate pr-4">موضوع الرسالة</h3>
                <button onclick="closeModal()" class="text-2xl">&times;</button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto text-sm leading-relaxed">
                </div>
        </div>
    </div>

    <script>
        // --- الأساسيات والوضع الليلي ---
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            const icon = themeToggle.querySelector('i');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        };

        let currentEmail = "";
        let emailUser = "";
        let emailDomain = "";

        // --- توليد ايميل جديد ---
        async function genEmail() {
            try {
                const res = await fetch('https://www.1secmail.com/api/v1/?action=genEmailDefault');
                const data = await res.json();
                currentEmail = data[0];
                [emailUser, emailDomain] = currentEmail.split('@');
                document.getElementById('emailAddr').value = currentEmail;
                document.getElementById('messages').innerHTML = `
                    <div class="flex flex-col items-center justify-center p-20 text-gray-400">
                        <i class="fas fa-sync fa-spin text-3xl mb-4 text-primary"></i>
                        <p class="text-sm">بانتظار وصول رسائل جديدة...</p>
                    </div>`;
                checkMail();
            } catch (e) {
                alert("خطأ في الاتصال بالسيرفر");
            }
        }

        function copyEmail() {
            const el = document.getElementById('emailAddr');
            el.select();
            navigator.clipboard.writeText(el.value);
            // تغذية بصرية بسيطة للأيفون
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
            setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> نسخ'; }, 2000);
        }

        // --- فحص البريد الوارد ---
        async function checkMail() {
            if (!emailUser) return;
            try {
                const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${emailUser}&domain=${emailDomain}`);
                const mails = await res.json();
                
                if (mails.length > 0) {
                    renderMessages(mails);
                }
            } catch (e) { console.log("خطأ في التحديث"); }
        }

        function renderMessages(mails) {
            const container = document.getElementById('messages');
            container.innerHTML = mails.map(m => `
                <div onclick="readMail(${m.id})" class="p-5 border-b dark:border-gray-700 hover:bg-blue-50 dark:hover:bg-blue-900/10 cursor-pointer active:bg-gray-100 transition">
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-primary truncate w-2/3 text-right">${m.from}</span>
                        <span class="text-[10px] text-gray-400">${m.date.split(' ')[1]}</span>
                    </div>
                    <div class="text-sm font-medium text-gray-600 dark:text-gray-300 truncate">${m.subject || '(بدون عنوان)'}</div>
                </div>
            `).join('');
        }

        // --- قراءة رسالة محددة ---
        async function readMail(id) {
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${emailUser}&domain=${emailDomain}&id=${id}`);
            const data = await res.json();
            
            document.getElementById('modalSubject').innerText = data.subject;
            document.getElementById('modalBody').innerHTML = data.htmlBody || `<pre class="whitespace-pre-wrap">${data.body}</pre>`;
            document.getElementById('mailModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('mailModal').classList.add('hidden');
        }

        // تحديث كل 6 ثوانٍ
        setInterval(checkMail, 6000);
        window.onload = genEmail;
    </script>
</body>
</html>
