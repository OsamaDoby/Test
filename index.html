<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doby Mail | Neo Generation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neonBlue: '#00f2ff',
                        neonPurple: '#bc13fe',
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(0, 242, 255, 0.5)',
                        'neon-strong': '0 0 25px rgba(188, 19, 254, 0.6)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Tajawal:wght@400;700&display=swap');
        
        body { 
            background: #050b18; 
            font-family: 'Tajawal', sans-serif; 
            color: #fff;
            overflow-x: hidden;
        }
        .en-mode { font-family: 'Orbitron', sans-serif; direction: ltr; }
        
        /* تأثير الخلفية المتحركة */
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a2a6c 0%, #b21f1f 50%, #fdbb2d 100%);
            opacity: 0.15; z-index: -1; animation: pulse bgMove 10s infinite alternate;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .neon-border {
            border: 1px solid var(--tw-neonBlue);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        @keyframes pulse { 0% { opacity: 0.1; } 100% { opacity: 0.25; } }
    </style>
</head>
<body class="dark">
    <div class="bg-animate"></div>

    <nav class="p-6 flex justify-between items-center max-w-5xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 glass flex items-center justify-center border border-neonBlue shadow-neon">
                <i class="fas fa-robot text-neonBlue text-xl"></i>
            </div>
            <span class="text-2xl font-bold tracking-widest text-white">DOBY<span class="text-neonBlue">MAIL</span></span>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleLang()" class="glass px-4 py-2 text-xs font-bold hover:border-neonBlue transition" id="langBtn">EN</button>
            <button onclick="toggleTheme()" class="glass p-2 w-10 h-10 flex items-center justify-center"><i class="fas fa-sun text-yellow-400"></i></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 mt-10">
        <div class="glass p-8 relative overflow-hidden mb-10">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-neonBlue opacity-20 blur-3xl"></div>
            
            <div class="text-center mb-8">
                <h1 id="mainTitle" class="text-3xl font-bold mb-2">منصة البريد الذكي</h1>
                <p id="subTitle" class="text-gray-400 text-sm">أمان كامل، خصوصية فائقة، وهوية رقمية مؤقتة.</p>
            </div>

            <div class="relative group mb-6">
                <input type="text" id="emailAddr" readonly 
                    class="w-full bg-black/40 border border-gray-700 p-5 rounded-xl text-center font-mono text-xl text-neonBlue outline-none focus:border-neonBlue transition-all shadow-inner"
                    value="WAITING FOR SIGNAL...">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button onclick="copyEmail()" class="glass p-4 hover:bg-neonBlue/20 transition flex flex-col items-center gap-2 group">
                    <i class="fas fa-copy group-hover:scale-110"></i>
                    <span class="text-[10px]" id="btnCopy">نسخ</span>
                </button>
                <button onclick="genEmail()" class="glass p-4 hover:bg-neonPurple/20 transition flex flex-col items-center gap-2 group border-neonPurple/30">
                    <i class="fas fa-sync-alt group-hover:rotate-180 duration-500"></i>
                    <span class="text-[10px]" id="btnNew">جديد</span>
                </button>
                <button onclick="downloadQR()" class="glass p-4 hover:bg-green-500/20 transition flex flex-col items-center gap-2">
                    <i class="fas fa-qrcode"></i>
                    <span class="text-[10px]" id="btnQR">QR كود</span>
                </button>
                <button onclick="toggleSound()" id="soundBtn" class="glass p-4 hover:bg-yellow-500/20 transition flex flex-col items-center gap-2">
                    <i class="fas fa-bell"></i>
                    <span class="text-[10px]" id="btnSound">تنبيه</span>
                </button>
            </div>
        </div>

        <div class="glass overflow-hidden shadow-neon-strong">
            <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-white/5">
                <h3 class="font-bold flex items-center gap-2 text-neonPurple">
                    <i class="fas fa-satellite-dish animate-pulse"></i>
                    <span id="inboxTitle">صندوق الوارد</span>
                </h3>
                <button onclick="clearInbox()" class="text-[10px] text-red-400 hover:text-red-300">
                    <i class="fas fa-trash-alt"></i> <span id="btnClear">مسح</span>
                </button>
            </div>

            <div id="messages" class="min-h-[250px] transition-all">
                <div class="p-20 text-center">
                    <div class="inline-block animate-bounce mb-4 text-gray-600"><i class="fas fa-arrow-down text-3xl"></i></div>
                    <p id="waitingText" class="text-gray-500 text-sm italic">في انتظار وصول بيانات من السيرفر...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // -- Configuration --
        let currentLang = 'ar';
        const apiBase = "https://www.1secmail.com/api/v1/";
        let email = '', user = '', domain = '';
        let soundEnabled = true;

        const langData = {
            ar: { title: "منصة البريد الذكي", sub: "أمان كامل، خصوصية فائقة", copy: "نسخ", new: "جديد", qr: "QR كود", sound: "تنبيه", inbox: "صندوق الوارد", clear: "مسح", wait: "في انتظار وصول بيانات من السيرفر...", btn: "EN" },
            en: { title: "Smart Mail Platform", sub: "Total Security, Ultra Privacy", copy: "Copy", new: "New", qr: "QR Code", sound: "Alert", inbox: "Inbox", clear: "Clear", wait: "Waiting for incoming data...", btn: "AR" }
        };

        // -- Functions --
        async function genEmail() {
            try {
                // محاولة توليد البريد بطريقة تضمن العمل على الموبايل
                const response = await fetch(`${apiBase}?action=genEmailDefault`);
                const data = await response.json();
                email = data[0];
                [user, domain] = email.split('@');
                document.getElementById('emailAddr').value = email;
                document.getElementById('messages').innerHTML = `<div class="p-20 text-center text-neonBlue animate-pulse">${langData[currentLang].wait}</div>`;
            } catch (error) {
                document.getElementById('emailAddr').value = "Error Connecting...";
                console.error("API Error:", error);
            }
        }

        async function checkMail() {
            if (!user) return;
            try {
                const res = await fetch(`${apiBase}?action=getMessages&login=${user}&domain=${domain}`);
                const mails = await res.json();
                if (mails.length > 0) {
                    if (soundEnabled) { /* Play ping sound logic */ }
                    renderMails(mails);
                }
            } catch (e) { console.error("Update fail"); }
        }

        function renderMails(mails) {
            const container = document.getElementById('messages');
            container.innerHTML = mails.map(m => `
                <div class="p-5 border-b border-gray-800 hover:bg-neonBlue/5 cursor-pointer transition flex justify-between items-center group">
                    <div>
                        <div class="text-neonBlue font-bold text-sm">${m.from}</div>
                        <div class="text-white text-xs mt-1">${m.subject}</div>
                    </div>
                    <i class="fas fa-chevron-left text-gray-700 group-hover:text-neonBlue transition"></i>
                </div>
            `).join('');
        }

        function toggleLang() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const d = langData[currentLang];
            document.getElementById('htmlTag').dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            if(currentLang === 'en') document.body.classList.add('en-mode'); else document.body.classList.remove('en-mode');
            
            document.getElementById('mainTitle').innerText = d.title;
            document.getElementById('subTitle').innerText = d.sub;
            document.getElementById('btnCopy').innerText = d.copy;
            document.getElementById('btnNew').innerText = d.new;
            document.getElementById('btnQR').innerText = d.qr;
            document.getElementById('btnSound').innerText = d.sound;
            document.getElementById('inboxTitle').innerText = d.inbox;
            document.getElementById('btnClear').innerText = d.clear;
            document.getElementById('langBtn').innerText = d.btn;
        }

        function copyEmail() {
            const field = document.getElementById('emailAddr');
            navigator.clipboard.writeText(field.value);
            alert("تم النسخ بنجاح!");
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').style.opacity = soundEnabled ? "1" : "0.5";
        }

        function clearInbox() {
            document.getElementById('messages').innerHTML = `<div class="p-20 text-center text-gray-500">${langData[currentLang].wait}</div>`;
        }

        // Initialize
        setInterval(checkMail, 5000);
        window.onload = genEmail;
    </script>
</body>
</html>
